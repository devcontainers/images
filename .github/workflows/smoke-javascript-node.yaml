name: Smoke test "javascript-node" build

on: 
  workflow_dispatch:
  push:
    branches:
    - main
  pull_request:
    paths:
      - src/javascript-node/**
      - .github/workflows/smoke-javascript-node.yaml
      - .github/actions/**
      - build/**
jobs:
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    steps:

    - name: Checkout
      id: checkout
      uses: actions/checkout@v6

    - name: Smoke test
      id: smoke_test
      uses: ./.github/actions/smoke-test
      with:
        image: javascript-node
